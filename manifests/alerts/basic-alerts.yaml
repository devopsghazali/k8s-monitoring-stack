apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: basic-workload-alerts
  namespace: monitoring
  labels:
    release: monitoring
    role: alert-rules
spec:
  groups:
    - name: workload-health.rules
      rules:
        - alert: PodRestartingTooOften
          expr: sum by (namespace, pod, container) (increase(kube_pod_container_status_restarts_total{container!="POD"}[15m])) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod container is restarting frequently"
            description: "Container {{ $labels.container }} in pod {{ $labels.namespace }}/{{ $labels.pod }} restarted more than 3 times in 15 minutes."

        - alert: HighNamespaceCPUUsage
          expr: |
            (
              sum by (namespace) (rate(container_cpu_usage_seconds_total{container!="", image!=""}[5m]))
              /
              sum by (namespace) (kube_pod_container_resource_limits{resource="cpu", unit="core"})
            ) > 0.8
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Namespace CPU usage is above 80 percent"
            description: "Namespace {{ $labels.namespace }} is using more than 80 percent of configured CPU limits for 10 minutes."
